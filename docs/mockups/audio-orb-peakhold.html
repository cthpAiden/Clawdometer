<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clawdometer — Audiowave Orb · Peak & Hold (same engine + settings)</title>
<!--
  DESIGN MOCKUP — "peak & hold" VU caps on top of the shipped engine.
  Same locked settings as every orb design:
    SPRING = JIT = 1.0 (100/100), RESPONSE = 1.82, BOUNCE = 1.56,
    no +0.03 floor, jitter gated by envelope. Engine = v3 anti-sticky.
  The bars are UNCHANGED shipped physics; peak-hold is a PURELY VISUAL
  overlay: a cap per bar that snaps to the bar's peak, freezes for HOLD
  frames, then falls under FALL gravity until the bar overtakes it again.
  Fake spectrum — open in a real browser to see it move.
-->
<style>
  html,body{margin:0;background:#0d1015;color:#e9edf2}
  body{padding:20px;font-family:ui-sans-serif,system-ui,sans-serif}
  .board{max-width:640px;margin:0 auto}
  .head{text-align:center;padding-bottom:12px}
  .head h1{font-size:15px;margin:0 0 6px;font-weight:800}
  .badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .b{font-size:10px;font-weight:700;color:#c8e05a;background:rgba(200,224,90,.1);
     border:1px solid rgba(200,224,90,.25);border-radius:20px;padding:3px 9px}
  .b.mut{color:#9aa0a8;background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1)}
  .ctrls{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;padding:12px 0 16px;font-size:12px;color:#9aa0a8}
  .ctrls label{display:flex;gap:6px;align-items:center}
  .ctrls select{background:#181b22;color:#e9edf2;border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:4px 8px}
  .ctrls input[type=range]{width:80px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .cell{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
        border-radius:14px;padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .tag{font-size:10px;letter-spacing:.3px;color:#8a8f98;font-weight:700}
  .stage{position:relative;width:170px;height:170px}
  .ring{position:absolute;inset:0}
  .bar{position:absolute;transform-origin:center bottom;border-radius:2px;background:#c8e05a}
  .cap{position:absolute;border-radius:1px;background:#fff;box-shadow:0 0 4px rgba(255,255,255,.7)}
  .co{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
      background:radial-gradient(circle at 50% 45%,rgba(18,22,28,.82),rgba(18,22,28,0) 74%)}
  .st{display:flex;flex-direction:column;align-items:center;gap:4px}
  .st.s2{margin-top:8px}
  .st .k{font-size:9.5px;color:#828994;font-weight:700}
  .st .k b{color:#eef1f5;font-weight:800}
  .st .k b.g{color:#c8e05a}
  .track{width:56px;height:4px;border-radius:2px;background:rgba(255,255,255,.1);overflow:hidden}
  .track i{display:block;height:100%;border-radius:2px}
  .reset{font-size:7.5px;color:#6b727b;font-weight:700;letter-spacing:.4px;margin-top:7px;text-transform:uppercase}
  .cap-lbl{font-size:9px;color:#828994;font-weight:700}
  .cap-lbl b{color:#c8e05a}
  .foot{text-align:center;font-size:10px;color:#7f8791;padding-top:14px}
</style>
</head>
<body>
<div class="board">
  <div class="head">
    <h1>Audiowave Orb — Peak &amp; Hold</h1>
    <div class="badges">
      <span class="b">Spring 100</span><span class="b">Jitter 100</span>
      <span class="b">RESPONSE 1.82</span><span class="b">BOUNCE 1.56</span>
      <span class="b mut">bars = shipped physics · caps = visual overlay</span>
    </div>
  </div>
  <div class="ctrls">
    <label>Track
      <select id="trk"><option value="0">house</option><option value="1">trap</option><option value="2">lofi</option><option value="3">dubstep</option></select>
    </label>
    <label>Hold <input id="hold" type="range" min="0" max="60" value="26"><span id="holdv">26</span></label>
    <label>Fall <input id="fall" type="range" min="1" max="60" value="14"><span id="fallv">14</span></label>
  </div>
  <div class="grid" id="grid"></div>
  <div class="foot">White cap snaps to each bar's peak, holds, then falls. Same engine as the live skin — only the caps are new.</div>
</div>
<script>
(function(){
  var SPRING=1.0, JIT=1.0, RESPONSE=1.82, BOUNCE=1.56;
  var N=36;
  function fold(x){x=x%1;if(x<0)x+=1;return x<0.5?x*2:(1-x)*2;}
  function col(a){return 'hsl('+(60+fold(a)*110).toFixed(0)+',82%,56%)';}

  function mkBar(i,cnt){return {y:0,v:0,env:0, peak:0.04, holdT:0,
    binA:((i*13)%cnt)/cnt, binB:((i*29+7)%cnt)/cnt, binC:((i*7+3)%cnt)/cnt,
    phase:i*2.399, oscf:3.5+(i%9)*0.85,
    attack:0.30+(i%6)*0.06, release:0.18+(i%8)*0.035,
    decay:0.74+(i%9)*0.02, k:0.14+(i%7)*0.018, i:i};}

  // Shared shipped engine step -> current bar frac (0.04..1.25).
  function step(b,t){
    var a=lerpBin(fold(b.binA+t*0.05)), c=lerpBin(b.binB), dd=lerpBin(fold(b.binC-t*0.03));
    var osc=Math.sin(b.phase+t*b.oscf)*0.5+0.5;
    var tgt=Math.min(1,(a*0.40+c*0.30*osc+dd*0.20)*RESPONSE);
    if(tgt>b.env)b.env+=(tgt-b.env)*b.attack; else b.env+=(tgt-b.env)*(b.release+SPRING*0.15);
    var force=(b.env-b.y)*b.k*(1+SPRING*1.3)*BOUNCE;
    b.v=(b.v+force)*(b.decay-SPRING*0.06); b.y+=b.v; if(b.y<0){b.y=0;b.v*=-0.3;}
    var jj=JIT*0.06*Math.sin(t*(9+b.i*1.3)+b.phase)*b.env;
    return Math.max(0.04,Math.min(1.25,b.y+jj));
  }
  // Peak-hold overlay: snap up instantly, freeze HOLD frames, then fall by FALL.
  function peakHold(b,frac){
    if(frac>=b.peak){ b.peak=frac; b.holdT=HOLD; }
    else if(b.holdT>0){ b.holdT--; }
    else { b.peak=Math.max(frac, b.peak - FALL); }
    return b.peak;
  }

  var spec=new Float32Array(N);
  function lerpBin(fr){var x=fr*N,i=Math.floor(x),a=spec[(i%N+N)%N],b=spec[((i+1)%N+N)%N];return a+(b-a)*(x-i);}
  function fillSpec(t,trk){for(var i=0;i<N;i++){var f=i/N,v;
    if(trk===0){var bass=Math.max(0,Math.sin(t*2)*.5+.5)*(1-f)*1.1,kick=Math.pow(Math.max(0,Math.sin(t*3.14159)),8)*(f<.15?1:0),mid=Math.max(0,Math.sin(t*1.3+f*8))*.4*(f>.2&&f<.7?1:.3),hat=(Math.sin(t*11+i)*.5+.5)*.25*(f>.7?1:.2);v=bass+kick+mid+hat;}
    else if(trk===1){var k2=Math.pow(Math.max(0,Math.sin(t*4.2)),6)*(f<.2?1.2:0),snare=Math.pow(Math.max(0,Math.sin(t*2.1+1.5)),4)*(f>.3&&f<.5?1:.1),hh=(Math.sin(t*23+i*2)*.5+.5)*.4*(f>.6?1:.15);v=k2+snare+hh+.05;}
    else if(trk===2){var warm=Math.max(0,Math.sin(t*.9+f*5))*.5*(1-f*.5),vinyl=(Math.sin(t*7+i)*.5+.5)*.12;v=warm+vinyl+.1;}
    else{var wob=Math.abs(Math.sin(t*3+Math.sin(t*1.3)*3))*(1-f)*1.2,drop=Math.pow(Math.max(0,Math.sin(t*.7)),3)*.6,gr=(Math.sin(t*17+i*3)*.5+.5)*.3*(f>.5?1:.3);v=wob+drop+gr;}
    spec[i]=Math.min(1,v);}}

  function centerDisc(stage){var co=document.createElement('div');co.className='co';
    co.innerHTML='<div class="st"><span class="k">5H · <b class="g">63%</b></span><div class="track"><i style="width:63%;background:#c8e05a"></i></div></div>'+
      '<div class="st s2"><span class="k">7D · <b>41%</b></span><div class="track"><i style="width:41%;background:#cfd4da"></i></div></div>'+
      '<div class="reset">resets 2h 14m</div>';stage.appendChild(co);}
  function caption(cell,html){var c=document.createElement('div');c.className='cap-lbl';c.innerHTML=html;cell.appendChild(c);}

  var W=170, MAXLEN=24;
  var DESIGNS=[

  // A · RING + peak-hold — the shipped topology (this is what would ship).
  {n:'ring · peak-hold', build:function(stage){var ring=document.createElement('div');ring.className='ring';stage.appendChild(ring);
    var cnt=54,bars=[],IR=55;for(var i=0;i<cnt;i++){var ang=i/cnt*360;
      var sp=document.createElement('div');sp.style.cssText='position:absolute;left:50%;top:50%;width:0;height:0;transform:rotate('+ang+'deg)';
      var d=document.createElement('div');d.className='bar';d.style.cssText='position:absolute;bottom:'+IR+'px;left:-1px;width:2px;height:'+MAXLEN+'px';
      var cap=document.createElement('div');cap.className='cap';cap.style.cssText='position:absolute;bottom:'+IR+'px;left:-1.6px;width:3.2px;height:2px';
      sp.appendChild(d);sp.appendChild(cap);ring.appendChild(sp);var b=mkBar(i,cnt);b.el=d;b.cap=cap;b.IR=IR;bars.push(b);}
    centerDisc(stage);return bars;},
   render:function(bars,t){for(var i=0;i<bars.length;i++){var b=bars[i],f=step(b,t),p=peakHold(b,f);
     b.el.style.transform='scaleY('+f+')';b.el.style.opacity=(0.4+f*0.55).toFixed(2);b.el.style.background=col(b.binA+f*0.35);
     b.cap.style.transform='translateY('+(-p*MAXLEN)+'px)';}}},

  // B · LINEAR EQ + peak-hold — the canonical VU look.
  {n:'linear · peak-hold', build:function(stage,cell){var ring=document.createElement('div');ring.className='ring';stage.appendChild(ring);
    var cnt=28,bars=[],gap=W/cnt,BASE=34,H=100;for(var i=0;i<cnt;i++){
      var d=document.createElement('div');d.className='bar';d.style.cssText='position:absolute;bottom:'+BASE+'px;left:'+(i*gap+gap*0.2)+'px;width:'+(gap*0.6)+'px;height:'+H+'px';
      var cap=document.createElement('div');cap.className='cap';cap.style.cssText='position:absolute;bottom:'+BASE+'px;left:'+(i*gap+gap*0.2)+'px;width:'+(gap*0.6)+'px;height:2.5px';
      ring.appendChild(d);ring.appendChild(cap);var b=mkBar(i,cnt);b.el=d;b.cap=cap;b.H=H;bars.push(b);}
    caption(cell,'5H <b>63%</b> · 7D 41% · resets 2h 14m');return bars;},
   render:function(bars,t){for(var i=0;i<bars.length;i++){var b=bars[i],fr=step(b,t)/1.25,f=Math.max(0.03,fr),p=peakHold(b,f);
     b.el.style.transform='scaleY('+f+')';b.el.style.opacity=(0.4+f*0.6).toFixed(2);b.el.style.background=col(b.binA+f*0.35);
     b.cap.style.transform='translateY('+(-p*b.H)+'px)';}}},

  // C · MIRROR + peak-hold — caps on both the up and down halves.
  {n:'mirror · peak-hold', build:function(stage,cell){var ring=document.createElement('div');ring.className='ring';stage.appendChild(ring);
    var cnt=28,bars=[],gap=W/cnt,MID=85,H=58;for(var i=0;i<cnt;i++){var x=i*gap+gap*0.2,w=gap*0.6;
      var up=document.createElement('div');up.className='bar';up.style.cssText='position:absolute;bottom:'+MID+'px;left:'+x+'px;width:'+w+'px;height:'+H+'px';
      var dn=document.createElement('div');dn.className='bar';dn.style.cssText='position:absolute;top:'+MID+'px;left:'+x+'px;width:'+w+'px;height:'+H+'px;transform-origin:center top';
      var capU=document.createElement('div');capU.className='cap';capU.style.cssText='position:absolute;bottom:'+MID+'px;left:'+x+'px;width:'+w+'px;height:2.5px';
      var capD=document.createElement('div');capD.className='cap';capD.style.cssText='position:absolute;top:'+MID+'px;left:'+x+'px;width:'+w+'px;height:2.5px';
      ring.appendChild(up);ring.appendChild(dn);ring.appendChild(capU);ring.appendChild(capD);
      var b=mkBar(i,cnt);b.up=up;b.dn=dn;b.capU=capU;b.capD=capD;b.H=H;bars.push(b);}
    caption(cell,'5H <b>63%</b> · 7D 41% · resets 2h 14m');return bars;},
   render:function(bars,t){for(var i=0;i<bars.length;i++){var b=bars[i],fr=step(b,t)/1.25,f=Math.max(0.03,fr),p=peakHold(b,f),c=col(b.binA+f*0.35);
     b.up.style.transform='scaleY('+f+')';b.up.style.background=c;b.up.style.opacity=(0.4+f*0.6).toFixed(2);
     b.dn.style.transform='scaleY('+(f*0.7)+')';b.dn.style.background=c;b.dn.style.opacity=(0.25+f*0.4).toFixed(2);
     b.capU.style.transform='translateY('+(-p*b.H)+'px)';
     b.capD.style.transform='translateY('+(p*0.7*b.H)+'px)';}}}

  ];

  var grid=document.getElementById('grid'),live=[];
  DESIGNS.forEach(function(D){var cell=document.createElement('div');cell.className='cell';
    var tag=document.createElement('div');tag.className='tag';tag.textContent=D.n;cell.appendChild(tag);
    var stage=document.createElement('div');stage.className='stage';cell.appendChild(stage);
    grid.appendChild(cell);live.push({D:D,bars:D.build(stage,cell)});});

  var trk=0,t=0,HOLD=26,FALL=14/1000;
  document.getElementById('trk').onchange=function(e){trk=+e.target.value;};
  document.getElementById('hold').oninput=function(e){HOLD=+e.target.value;document.getElementById('holdv').textContent=e.target.value;};
  document.getElementById('fall').oninput=function(e){FALL=+e.target.value/1000;document.getElementById('fallv').textContent=e.target.value;};
  function frame(){t+=0.016;fillSpec(t,trk);for(var i=0;i<live.length;i++)live[i].D.render(live[i].bars,t);requestAnimationFrame(frame);}
  frame();
})();
</script>
</body>
</html>
