<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-rice="classic">
  <div id="card">
    <div id="header">
      <span class="clawd-i" data-px="1.45"></span>
      <span class="ttl">Usage</span>
      <span id="countdown" class="rst-top">—</span>
    </div>
    <div class="rows">
      <div class="r">
        <span class="lbl"><span class="lf">Current</span><span class="lc">5H</span></span>
        <div class="bar"><div id="bar5h" class="fill"></div></div>
        <span id="txt5h" class="pct">—</span>
      </div>
      <div class="r">
        <span class="lbl"><span class="lf">Weekly</span><span class="lc">7D</span></span>
        <div class="bar"><div id="bar7d" class="fill"></div></div>
        <span id="txt7d" class="pct">—</span>
      </div>
      <div class="r">
        <span class="lbl"><span class="lf">Fable</span><span class="lc">FBL</span></span>
        <div class="bar"><div id="barfb" class="fill"></div></div>
        <span id="txtfb" class="pct">—</span>
      </div>
    </div>
  </div>
  <div id="bento">
    <div class="hd2">
      <span class="clawd-i" data-px="1.45"></span>
      <span class="ttl">Usage</span>
      <span id="brtop2" class="rst-top hd-reset">—</span>
    </div>
    <div class="top card">
      <div class="toprow"><span class="pct" id="b5v">—</span><span class="lbl">Current</span><span id="brtop" class="rst-top">—</span></div>
      <div class="bar"><div id="b5b" class="fill"></div></div>
    </div>
    <div class="cel card">
      <div class="celtop"><span class="lbl">Weekly</span><span class="pct" id="b7v">—</span></div>
      <div class="bar"><div id="b7b" class="fill"></div></div>
    </div>
    <div class="cel card">
      <div class="celtop"><span class="lbl">Fable</span><span class="pct" id="bfv">—</span></div>
      <div class="bar"><div id="bfb" class="fill"></div></div>
    </div>
  </div>
  <div id="underline">
    <div class="uhead">
      <span class="clawd-i" data-px="1.45"></span>
      <span class="ttl">Usage</span>
      <span id="ureset" class="rst-top">—</span>
    </div>
    <div class="u"><div class="urow"><span class="lbl">Current</span><span id="utxt5h" class="pct">—</span></div><div class="uline"><i id="uln5h"></i></div></div>
    <div class="u"><div class="urow"><span class="lbl">Weekly</span><span id="utxt7d" class="pct">—</span></div><div class="uline"><i id="uln7d"></i></div></div>
    <div class="u"><div class="urow"><span class="lbl">Fable</span><span id="utxtfb" class="pct">—</span></div><div class="uline"><i id="ulnfb"></i></div></div>
  </div>
  <!-- ClawdBoy — a handheld console whose screen is a true 2-bit panel: one glass
       color, one ink color, no third value. Three layouts share the plastic shell;
       data-rice shows exactly one. Every value cell is [data-k], so main.js writes
       all three layouts blind and the hidden two are free no-ops. -->
  <div id="clawdboy">
    <div class="cb-body">
      <div class="cb-scr">
        <div class="cb-table">
          <span class="clawd-i" data-px="1.47"></span>
          <div class="cb-col">
            <div class="cb-rw hero"><span>5H</span><span class="cb-v" data-k="5h">—</span></div>
            <div class="cb-rw"><span>7D</span><span class="cb-v" data-k="7d">—</span></div>
            <div class="cb-rw"><span>FB</span><span class="cb-v" data-k="fb">—</span></div>
            <div class="cb-rw rst"><span class="cb-lf">RESET</span><span class="cb-lc">↻</span><span class="cb-v" data-k="rst">—</span></div>
          </div>
        </div>
        <div class="cb-menu">
          <div class="cb-li sel"><span class="c">▸</span><span class="cb-lf">5H WINDOW</span><span class="cb-lc">5H</span><span class="cb-v" data-k="5h">—</span></div>
          <div class="cb-li"><span class="c"></span><span class="cb-lf">WEEKLY</span><span class="cb-lc">7D</span><span class="cb-v" data-k="7d">—</span></div>
          <div class="cb-li"><span class="c"></span><span class="cb-lf">FABLE</span><span class="cb-lc">FB</span><span class="cb-v" data-k="fb">—</span></div>
          <div class="cb-li"><span class="c"></span><span class="cb-lf">RESET IN</span><span class="cb-lc">↻</span><span class="cb-v" data-k="rst">—</span></div>
          <div class="cb-mv"><span class="clawd-i" data-px="0.87"></span></div>
        </div>
        <div class="cb-quad">
          <div class="cb-q"><span class="k">CURRENT</span><span class="cb-v" data-k="5h">—</span></div>
          <div class="cb-q"><span class="k">WEEKLY</span><span class="cb-v" data-k="7d">—</span></div>
          <div class="cb-q"><span class="k">FABLE</span><span class="cb-v" data-k="fb">—</span></div>
          <div class="cb-q mas"><span class="clawd-i" data-px="0.89"></span><span class="cb-v rst" data-k="rst">—</span></div>
        </div>
      </div>
      <div class="cb-ctl">
        <div class="cb-dpad"></div>
        <span class="cb-wm">Clawd<i>Boy</i></span>
        <div class="cb-btns"><i></i><i></i></div>
      </div>
    </div>
  </div>
  <div id="orb">
    <div class="ring"></div>
    <div class="co">
      <div class="st"><span class="k">5H · <b id="o5h" class="g">—</b></span><div class="track"><i id="ob5"></i></div></div>
      <div class="st s2"><span class="k">7D · <b id="o7d">—</b></span><div class="track"><i id="ob7"></i></div></div>
      <div class="reset" id="oreset"></div>
    </div>
  </div>
  <script src="usage-color.js"></script>
  <script src="clawd.js"></script>
  <script src="main.js"></script>
  <script src="bento.js"></script>
  <script src="orb.js"></script>
</body>
</html>
