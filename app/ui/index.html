<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="card">
    <div id="header">
      <span id="label">Current<span class="lsfx"> session</span></span>
      <span id="countdown">—</span>
    </div>
    <div id="txt5h" class="num">—</div>
    <div class="bar main"><div id="bar5h" class="fill"></div></div>
    <span class="wlabel">Weekly</span>
    <div class="wbar">
      <div class="bar thin"><div id="bar7d" class="fill"></div></div>
      <span id="txt7d" class="pct">—</span>
    </div>
    <div id="footer">
      <span id="age">waiting for usage data</span>
      <span id="reset"></span>
    </div>
  </div>
  <div id="orb">
    <div class="ring"></div>
    <div class="co">
      <div class="st"><span class="k">5H · <b id="o5h" class="g">—</b></span><div class="track"><i id="ob5"></i></div></div>
      <div class="st s2"><span class="k">7D · <b id="o7d">—</b></span><div class="track"><i id="ob7"></i></div></div>
      <div class="reset" id="oreset"></div>
    </div>
  </div>
  <script src="main.js"></script>
  <script src="orb.js"></script>
</body>
</html>
